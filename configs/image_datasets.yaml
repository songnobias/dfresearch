# Image Dataset Configurations for Training
# Curated subset of gasbench benchmark datasets, selected for diversity and accessibility.
# These are used for TRAINING deepfake detectors, not for final benchmarking.

train_samples_per_class: 5000
val_samples_per_class: 1000

datasets:
  # ── Real images ──────────────────────────────────────────────────────────
  - name: flickr30k
    path: nlphuji/flickr30k
    modality: image
    media_type: real
    source_format: zip
    max_samples: 1500
    notes: "Diverse real-world photos — Flickr"

  - name: celeb-a-hq
    path: bitmind/celeb-a-hq
    modality: image
    media_type: real
    source_format: zip
    max_samples: 1500
    notes: "High-quality celebrity face images"

  - name: ffhq-256
    path: bitmind/ffhq-256
    modality: image
    media_type: real
    source_format: zip
    max_samples: 1500
    notes: "Flickr-Faces-HQ at 256px — diverse faces"

  - name: ms-coco-unique
    path: bitmind/MS-COCO-unique-256
    modality: image
    media_type: real
    source_format: zip
    max_samples: 1000
    notes: "MS-COCO unique images at 256px — diverse scenes"

  - name: open-image-v7
    path: bitmind/open-image-v7-256
    modality: image
    media_type: real
    source_format: zip
    max_samples: 1000
    notes: "Open Images V7 at 256px — diverse objects/scenes"

  - name: lfw
    path: bitmind/lfw
    modality: image
    media_type: real
    source_format: zip
    max_samples: 500
    notes: "Labeled Faces in the Wild — unconstrained face photos"

  # ── Synthetic images ─────────────────────────────────────────────────────
  - name: SFHQ-part1
    path: bitmind/SyntheticFacesHQ
    modality: image
    media_type: synthetic
    source_format: zip
    max_samples: 1000
    include_paths: ["SFHQ-part1.zip"]
    notes: "Synthetic Faces HQ — GAN-generated faces"

  - name: Dalle-3-1M
    path: bitmind/Dalle-3-1M
    modality: image
    media_type: synthetic
    source_format: tar
    max_samples: 1000
    notes: "DALL-E 3 generated images"

  - name: genimage-midjourney
    path: bitmind/GenImage_MidJourney
    modality: image
    media_type: synthetic
    source_format: zip
    max_samples: 1000
    notes: "Midjourney-generated images"

  - name: journeydb
    path: bitmind/JourneyDB
    modality: image
    media_type: synthetic
    source_format: zip
    max_samples: 1000
    notes: "JourneyDB — diverse AI-generated images"

  - name: fakeclue-fake-genimage
    path: bitmind/FakeClue
    modality: image
    media_type: synthetic
    source_format: zip
    max_samples: 1000
    include_paths: ["data/fake/genimage/"]
    notes: "FakeClue GenImage subset"

  - name: nano-banana-150k
    path: bitmind/Nano-banana-150k
    modality: image
    media_type: synthetic
    source_format: zip
    max_samples: 500
    notes: "Banana diffusion-generated images"

  # ── Semisynthetic images ─────────────────────────────────────────────────
  - name: face-swap
    path: bitmind/face-swap
    modality: image
    media_type: semisynthetic
    max_samples: 500
    notes: "Face-swapped images — tests manipulation detection"
